<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page </title>
  <link rel="stylesheet" href="login.css">
  <style>

  </style>
</head>
<body>
  <div class="login-container">
    <h2><U>Login</U></h2>
    <form>
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>

      <label for="captcha">Captcha</label>
      <div class="captcha-box">
        <span class="captcha-text" id="captcha">A1B2C</span>
        <button type="button" class="refresh-btn" onclick="generateCaptcha()">Refresh</button>
      </div>
      <input class="captcha-input" type="text" id="captcha-input" placeholder="Enter captcha here" required>

      <input type="submit" value="Login">
    </form>

    <div class="new-user">
New user? <a target="_blank" href="/login-button/new-user.html">Create an account</a>
    </div>
  </div>

  <script src="login.js">
   
  </script>
</body>
</html>
